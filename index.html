<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="客觀、安全、去識別化的租賃數據庫。">
    <title>租賃履約紀錄比對系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div id="toast-container" class="toast-container"></div>
        <header>
            <h1>🛡️ 蒙眼</h1>
            <p>去識別化租賃數據庫</p>
        </header>

        <!-- 使用者資訊列 -->
        <div id="user-bar" class="user-bar hidden">
            <img id="user-avatar" class="user-avatar" src="" alt="頭貼">
            <div class="user-info">
                <span id="user-name" class="user-name">載入中...</span>
                <span id="user-quota" class="user-quota"></span>
            </div>
        </div>

        <div class="stats-dashboard">
            <div class="stat-box user-stat">
                <div class="stat-title">👤 民間回報數據</div>
                <div class="stat-number"><span id="stat-user-num">載入中</span> <span class="stat-unit">筆</span></div>
            </div>
        </div>

        <!-- 搜尋主畫面 -->
        <section id="view-search" class="view">
            <div class="card">
                <div class="input-group">
                    <label for="in-name">對象姓名 <span class="required">*</span></label>
                    <input type="text" id="in-name" placeholder="請輸入真實姓名" required>
                </div>

                <div class="input-group">
                    <label>目測年齡</label>
                    <select id="in-age">
                        <option value="">不限/未知</option>
                        <option value="20-30">20-30 歲</option>
                        <option value="30-40">30-40 歲</option>
                        <option value="40-50">40-50 歲</option>
                        <option value="50+">50 歲以上</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>性別</label>
                    <select id="in-gender">
                        <option value="">不限/未知</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                        <option value="其他">其他 / 未知</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="in-phone">電話末四碼 (選填)</label>
                    <input type="tel" id="in-phone" inputmode="numeric" pattern="[0-9]{4}" maxlength="4"
                        placeholder="請輸入 4 位數字" oninput="this.value=this.value.replace(/\D/g,'').slice(0,4);">
                </div>

                <button class="btn-primary" onclick="handleSearch()">🔍 查詢履約紀錄</button>
                <div class="divider"><span>或</span></div>

                <button class="btn-outline" id="btn-open-report" onclick="switchView('view-report'); renderTags();">✍️ 建立履約紀錄建檔</button>
            </div>
        </section>

        <section id="view-loading" class="view hidden">
            <div class="loader-content">
                <div class="spinner"></div>
                <p id="loading-text">🔒 正在透過安全通道檢索資料庫...</p>
            </div>
        </section>

        <section id="view-results" class="view hidden">
            <div class="result-header">
                <div class="score-container">
                    <div class="score-label">⚖️ 資料庫比對狀態</div>
                    <div id="risk-spectrum" class="risk-spectrum">
                        <div class="spectrum-bar">
                            <div class="spectrum-seg seg-green"></div>
                            <div class="spectrum-seg seg-yellow"></div>
                            <div class="spectrum-seg seg-orange"></div>
                            <div class="spectrum-seg seg-red"></div>
                        </div>
                        <div id="spectrum-pointer" class="spectrum-pointer" style="left: 10%;"></div>
                        <div class="spectrum-labels">
                            <span>未偵測</span><span>低度</span><span>中度</span><span>高度</span>
                        </div>
                    </div>
                    <div id="risk-advice" class="risk-advice"></div>
                    <div id="results-tags-container" class="results-tags-container hidden">
                        <div class="results-tags-header"><span>📌 偵測特徵頻率</span><span class="decay-hint">已套用歷史衰退機制</span></div>
                        <div id="results-tags" class="tag-selector-grid"></div>
                    </div>
                    <div id="query-ref" class="query-ref"></div>
                </div>
            </div>

            <div class="btn-group" style="padding: 0 15px;">
                <button class="btn-primary" style="margin-top: 10px;" onclick="resetApp()">🔙 返回重新搜尋</button>
            </div>

            <!-- 🛠️ 管理員隱藏工具區 -->
            <div id="admin-tool-section" class="hidden" style="margin-top: 20px; border-top: 1px dashed var(--border); padding: 15px;">
                <button id="btn-admin-manage" class="btn-secondary w-full" onclick="switchView('view-admin-tool')">⚙️ 進入管理員下架工具</button>
            </div>
        </section>

        <section id="view-admin-tool" class="view hidden">
            <div class="card">
                <h3>⚙️ 管理員下架工具</h3>
                <button class="btn-secondary" onclick="openTakedownForm()">📋 申請資料查核</button>
                <button class="btn-primary" style="margin-top: 20px;" onclick="resetApp()">返回首頁</button>
            </div>
        </section>

        <section id="view-report" class="view hidden">
            <div class="card user-data">
                <div class="card-tag">👤 建立民間履約回報</div>
                <div class="identity-switch">
                    <button id="btn-report-tenant" class="active" onclick="setReportType('tenant')">一般房客</button>
                    <button id="btn-report-student" onclick="setReportType('student')">學生房客</button>
                    <button id="btn-report-landlord" onclick="setReportType('landlord')">房東紀錄</button>
                </div>
                <div class="input-group">
                    <label>區域 <span class="required">*</span></label>
                    <select id="report-area" required>
                        <option value="" disabled selected>請選擇生活圈</option>
                        <option value="AREA_PCDV">新北核心</option><option value="AREA_TPDV">台北核心</option>
                        <option value="AREA_TYDV">桃園/中壢</option><option value="AREA_TCDV">台中核心</option>
                        <option value="AREA_KSDV">高雄核心</option>
                    </select>
                </div>
                <div class="input-group"><label>姓名 <span class="required">*</span></label><input type="text" id="report-name" required></div>
                <div class="input-group">
                    <label>電話末四碼 <span class="required">*</span></label>
                    <input type="tel" id="report-phone" maxlength="4" oninput="this.value=this.value.replace(/\D/g,'');" required>
                </div>
                <div class="input-group">
                    <label>發生年份 <span class="required">*</span></label>
                    <select id="report-year" required></select>
                </div>
                <div id="fields-tenant">
                    <div class="input-group">
                        <label>年齡</label><select id="report-age"><option value="20-30">20-30</option><option value="30-40">30-40</option><option value="40-50">40-50</option><option value="50+">50+</option></select>
                    </div>
                    <div class="input-group">
                        <label>性別</label><select id="report-gender"><option value="男">男</option><option value="女">女</option><option value="其他">其他</option></select>
                    </div>
                </div>
                <div id="fields-landlord" style="display:none;"></div>
                <div class="input-group"><label>特徵 (複選)</label><div id="tag-container" class="tag-selector-grid"></div></div>
                <div class="input-group agreement-box">
                    <label><input type="checkbox" id="report-agreement" required> <span>本人切結以上皆屬事實。</span></label>
                </div>
                <button class="btn-submit-yellow" onclick="submitReport()">🔒 加密並儲存紀錄</button>
                <button class="btn-primary" onclick="resetApp()">返回</button>
            </div>
        </section>

        <footer>
            <p class="legal-text">去識別化流水編號 | 數據來源：民間去識別化回報</p>
            <p class="footer-links"><a href="#" onclick="openToSModal(false); return false;">📜 服務條款與隱私聲明</a></p>
        </footer>
    </div>

    <!-- 終極合併：JavaScript 直接寫在 HTML 裡 -->
    <script>
        const SYSTEM_SALT = "TrU$t_Sca1e_8xP@qL9!mZ";
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw0dAVQ2HOQDvJKNBpj0FT1HJIPW6GLCdJkye3419ZMi2lzFqTUExD8oHdvLG4H_pKq/exec";
        const DEFAULT_LIFF_ID = "2009974240-zhGWMVVX";
        let currentUser = { uid: 'GUEST', platform: 'WEB', displayName: '訪客測試', pictureUrl: '' };

        async function callGAS(p) {
            try {
                const r = await fetch(GAS_API_URL, { method: "POST", mode: "cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(p) });
                return r.ok ? await r.json() : null;
            } catch (e) { return null; }
        }

        function hashData(t) {
            if (!t) return Promise.resolve("");
            var s = t + SYSTEM_SALT;
            var sha = function(a) {
                function r(v, a) { return (v >>> a) | (v << (32 - a)); };
                var mW = Math.pow(2, 32), res = '', w = [], h = [0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a, 0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19], k = [0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5, 0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174, 0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da, 0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967, 0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85, 0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070, 0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3, 0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2];
                a += '\x80'; while (a.length % 64 - 56) a += '\x00';
                for (var i = 0; i < a.length; i++) { var j = a.charCodeAt(i); w[i >> 2] |= j << ((3 - i) % 4) * 8; }
                w[w.length] = ((a.length * 8 / mW) | 0); w[w.length] = (a.length * 8 | 0);
                for (j = 0; j < w.length; j += 16) {
                    var sl = w.slice(j, j + 16), oH = h.slice(0);
                    for (i = 0; i < 64; i++) {
                        var w15 = sl[i-15], w2 = sl[i-2];
                        var aH = h[0], eH = h[4];
                        var t1 = h[7] + (r(eH, 6) ^ r(eH, 11) ^ r(r(eH, 25))) + ((eH & h[5]) ^ ((~eH) & h[6])) + k[i] + (sl[i] = (i < 16) ? sl[i] : (sl[i-16] + (r(w15, 7) ^ r(w15, 18) ^ (w15 >>> 3)) + sl[i-7] + (r(w2, 17) ^ r(w2, 19) ^ (w2 >>> 10))) | 0);
                        var t2 = (r(aH, 2) ^ r(aH, 13) ^ r(aH, 22)) + ((aH & h[1]) ^ (aH & h[2]) ^ (h[1] & h[2]));
                        h = [(t1 + t2) | 0].concat(h); h[4] = (h[4] + t1) | 0; h = h.slice(0, 8);
                    }
                    for (i = 0; i < 8; i++) h[i] = (h[i] + oH[i]) | 0;
                }
                for (i = 0; i < 8; i++) { for (var b, k2 = 3; k2 + 1; k2--) { b = (h[i] >> (k2 * 8)) & 255; res += ((b < 16) ? '0' : '') + b.toString(16); } }
                return res;
            };
            return Promise.resolve(sha(s));
        }

        async function initializeAuth() {
            try {
                if (window.liff) {
                    await liff.init({ liffId: DEFAULT_LIFF_ID });
                    if (liff.isLoggedIn()) {
                        const p = await liff.getProfile();
                        currentUser = { uid: `LINE_${p.userId}`, platform: 'LINE', displayName: p.displayName, pictureUrl: p.pictureUrl };
                    } else { liff.login(); return; }
                }
            } catch (e) { currentUser = { uid: 'GUEST_ERR', platform: 'WEB', displayName: '訪客測試' }; }
            updateUserInfoUI();
        }

        function updateUserInfoUI() {
            document.getElementById('user-name').innerText = currentUser.displayName;
            if (currentUser.pictureUrl) document.getElementById('user-avatar').src = currentUser.pictureUrl;
            document.getElementById('user-bar').classList.remove('hidden');
        }

        const TAG_LIBRARY = {
            tenant: [
                { text: "✨ 屋況維持極佳", impact: "good" }, { text: "🛠️ 擅自更動裝修", impact: "bad" },
                { text: "🤫 維持鄰里安寧", impact: "good" }, { text: "📦 堆置雜物爭議", impact: "bad" },
                { text: "🛡️ 設備妥善維護", impact: "good" }, { text: "🏚️ 設備毀損紀錄", impact: "bad" },
                { text: "📱 溝通聯繫順暢", impact: "good" }, { text: "🔊 鄰里噪音投訴", impact: "bad" },
                { text: "🧹 空間整潔清空", impact: "good" }, { text: "🚬 菸寵異味殘留", impact: "bad" },
                { text: "💰 準時給付租金", impact: "good" }, { text: "💸 租金給付遲延", impact: "bad" }
            ],
            landlord: [
                { text: "💸 押金如期返還", impact: "good" }, { text: "🔍 押金扣留爭議", impact: "bad" },
                { text: "⚡ 修繕處理迅速", impact: "good" }, { text: "⏳ 修繕推託延遲", impact: "bad" },
                { text: "🤝 溝通明理友善", impact: "good" }, { text: "💢 情緒勒索施壓", impact: "bad" }
            ],
            student: [
                { text: "🎓 專注學業單純", impact: "good" }, { text: "🎉 帶人開趴喧嘩", impact: "bad" },
                { text: "🧹 宿舍維持整潔", impact: "good" }, { text: "🛵 機車違規停放", impact: "bad" }
            ]
        };
        let selectedTags = new Set();
        let currentReportType = 'tenant';

        function setReportType(t) {
            currentReportType = t;
            document.querySelectorAll('.identity-switch button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-report-${t}`).classList.add('active');
            selectedTags.clear(); renderTags();
        }

        function renderTags() {
            const c = document.getElementById('tag-container');
            c.innerHTML = '';
            TAG_LIBRARY[currentReportType].forEach(tag => {
                const ch = document.createElement('div'); ch.className = 'tag-chip'; ch.innerText = tag.text;
                ch.onclick = () => { if (selectedTags.has(tag.text)) { selectedTags.delete(tag.text); ch.classList.remove('selected'); } else { selectedTags.add(tag.text); ch.classList.add('selected'); } };
                c.appendChild(ch);
            });
        }

        async function handleSearch() {
            const n = document.getElementById('in-name').value.trim();
            if (!n) return alert("請輸入姓名");
            switchView('view-loading');
            const hn = await hashData(n);
            const r = await callGAS({ action: "search", uid: await hashData(currentUser.uid), platform: currentUser.platform, hName: hn });
            if (r) { updateResultsUI(r); } else { updateResultsUI(95); }
            switchView('view-results');
        }

        function updateResultsUI(i) {
            const ad = document.getElementById('risk-advice');
            let risk = 'NONE';
            if (typeof i === 'number') { ad.innerText = "建議依一般程序查核"; } 
            else { 
                risk = i.riskLevel || 'NONE'; ad.innerText = i.message || "建議依標準程序查核"; 
                renderResultTags(i.tags || []);
                renderQueryRef(i.isAdmin);
            }
            updateSpectrum(risk);
        }

        function renderResultTags(ts) {
            const c = document.getElementById('results-tags'); c.innerHTML = '';
            document.getElementById('results-tags-container').classList.toggle('hidden', ts.length === 0);
            ts.forEach(t => {
                const el = document.createElement('div'); el.className = 'ui-tag';
                if (t.weight <= 0.4) el.classList.add('decay-40');
                el.innerHTML = `${t.text} <span class="tag-count">${t.count}</span>`;
                c.appendChild(el);
            });
        }

        function renderQueryRef(adm) {
            const el = document.getElementById('query-ref');
            let h = `查詢流水號: REF-${Math.random().toString(36).substr(2, 6).toUpperCase()}`;
            if (adm) h += ` <span onclick="toggleAdminTool()" style="cursor:pointer; margin-left:10px;">🛠️</span>`;
            el.innerHTML = h;
        }

        function toggleAdminTool() {
            const s = document.getElementById('admin-tool-section');
            s.classList.toggle('hidden');
            if (!s.classList.contains('hidden')) s.scrollIntoView({ behavior: 'smooth' });
        }

        function updateSpectrum(k) {
            const p = document.getElementById('spectrum-pointer');
            const pos = { NONE: '12.5%', LOW: '37.5%', MEDIUM: '62.5%', HIGH: '87.5%' };
            p.style.left = pos[k] || '12.5%';
        }

        async function submitReport() {
            const n = document.getElementById('report-name').value.trim();
            if (!n || selectedTags.size === 0) return alert("請完整填寫姓名並選擇標籤");
            switchView('view-loading');
            const r = await callGAS({ action: "report", uid: await hashData(currentUser.uid), platform: currentUser.platform, type: currentReportType, hName: await hashData(n), tags: Array.from(selectedTags) });
            alert(r?.message || "完成");
            resetApp();
        }

        function switchView(v) { document.querySelectorAll('.view').forEach(e => e.classList.toggle('hidden', e.id !== v)); }
        function resetApp() { 
            // 修正返回功能：不刷頁面，直接清空並返回搜尋頁
            document.getElementById('in-name').value = '';
            switchView('view-search');
        }
        function openTakedownForm() { window.open("https://line.me/R/ti/p/@your_line_oa_id", '_blank'); }

        window.onload = async () => {
            const s = document.getElementById('report-year'), cur = new Date().getFullYear();
            for (let y = cur; y >= 2018; y--) { const o = document.createElement('option'); o.value = y; o.innerText = `${y} 年`; s.appendChild(o); }
            await initializeAuth();
            switchView('view-search');
        };
    </script>

    <!-- 🛡️ 服務條款彈出視窗 -->
    <div id="tos-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header"><h2>🛡️ 平台服務條款</h2></div>
            <div id="tos-content" class="modal-body"><p>本系統僅供學術與參考使用...</p></div>
            <div class="modal-footer"><button id="btn-accept-tos" onclick="acceptToS()">我同意</button></div>
        </div>
    </div>
    <script>
        function acceptToS() { localStorage.setItem('tos_v1', 'true'); document.getElementById('tos-modal').classList.add('hidden'); }
        if (!localStorage.getItem('tos_v1')) document.getElementById('tos-modal').classList.remove('hidden');
    </script>
</body>

</html>
